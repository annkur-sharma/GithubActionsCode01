name: AI Predictor CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # This clears the deprecation warnings and opts into the new standard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to Node 24
          # cache: 'npm'

      # Fix: If you don't have a package-lock.json, 'npm ci' fails.
      # We use 'npm install' here to ensure the environment builds correctly.
      - name: Install Dependencies
        run: npm install

      - name: Build Static Web App
        run: npm run build
        env:
          CI: true

      - name: Verify Build Artifacts
        run: |
          if grep -q "Predictor Logic" build/index.html; then
            echo "✅ Build contains UI elements."
          else
            echo "❌ Build failed: UI elements missing."
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: build/
          retention-days: 7