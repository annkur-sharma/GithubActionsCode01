name: Production CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # VM_URL: "http://20.5.49.24:5000"

jobs:
  # --- JOB 1: THE PREDICTOR (The Scout) ---
  # Runs instantly to give you a risk assessment on the dashboard.
  build-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: AI Risk Assessment
        uses: annkur-sharma/AI-Utility01/predict@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Build Static Web App
        run: npm run build
        env:
          CI: true

      - name: Verify Build Artifacts
        run: |
          if [ -f "build/index.html" ] && grep -q "id=\"root\"" build/index.html && [ -d "build/static/js" ]; then
            echo "✅ Build Verification Passed"
          else
            echo "❌ Build Verification Failed"
            exit 1
          fi

      - name: Send Final Outcome to AI
        if: always() # IMPORTANT: Runs even if Build or Verify fails
        uses: annkur-sharma/AI-Utility01/feedback@v2